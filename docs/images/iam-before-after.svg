<svg xmlns="http://www.w3.org/2000/svg" width="940" height="390" viewBox="0 0 940 390">
  <rect width="940" height="390" fill="#fffdf6"/>
  <text x="45" y="48" font-family="Comic Sans MS, Arial" font-size="28" fill="#1f2937">Access cleanup, version 1 to version 2</text>
  <text x="48" y="78" font-family="Comic Sans MS, Arial" font-size="15" fill="#4b5563">The first review was too focused on permissions. The improved review looked at status, role, MFA, and approval evidence.</text>

  <rect x="65" y="120" width="350" height="200" rx="16" fill="#fee2e2" stroke="#991b1b" stroke-width="2" transform="rotate(-.7 65 120)"/>
  <text x="92" y="157" font-family="Comic Sans MS, Arial" font-size="21" fill="#7f1d1d">First pass</text>
  <text x="92" y="195" font-family="Comic Sans MS, Arial" font-size="15" fill="#1f2937">• Who has admin?</text>
  <text x="92" y="225" font-family="Comic Sans MS, Arial" font-size="15" fill="#1f2937">• Who has app access?</text>
  <text x="92" y="255" font-family="Comic Sans MS, Arial" font-size="15" fill="#1f2937">• Mark excessive access</text>
  <text x="92" y="292" font-family="Comic Sans MS, Arial" font-size="13" fill="#7f1d1d">Useful, but too shallow.</text>

  <path d="M445 220 C478 199, 505 199, 540 219" stroke="#374151" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M526 207 L542 220 L524 231" stroke="#374151" stroke-width="3" fill="none" stroke-linecap="round"/>

  <rect x="565" y="113" width="315" height="215" rx="16" fill="#dcfce7" stroke="#166534" stroke-width="2" transform="rotate(.8 565 113)"/>
  <text x="592" y="151" font-family="Comic Sans MS, Arial" font-size="21" fill="#14532d">Better pass</text>
  <text x="592" y="190" font-family="Comic Sans MS, Arial" font-size="15" fill="#1f2937">• Active employee?</text>
  <text x="592" y="220" font-family="Comic Sans MS, Arial" font-size="15" fill="#1f2937">• Role still matches?</text>
  <text x="592" y="250" font-family="Comic Sans MS, Arial" font-size="15" fill="#1f2937">• MFA required?</text>
  <text x="592" y="280" font-family="Comic Sans MS, Arial" font-size="15" fill="#1f2937">• Approval evidence?</text>
  <text x="592" y="308" font-family="Comic Sans MS, Arial" font-size="13" fill="#14532d">Much easier to defend.</text>
</svg>